# docker-compose.app-public.yml
#  FOR PRODUCTION #####################################
# Must be merged with the base compose.               #
# - Adds the python application                       #
# - Public access: no tomcat-users.xml or web.xml     #
# #####################################################
name: rime

services:
  web:
    volumes:
      - ../web/rime:/usr/local/tomcat/webapps/rime
      - python-app_logs:/usr/local/tomcat/webapps/rime/logs:ro
      - ./init-webapp-auth.sh:/init-webapp-auth.sh
      # Note: Neither tomcat-users.xml nor web.xml are mounted - webapp is publicly accessible
    entrypoint: ["/init-webapp-auth.sh"]

  python-app:
    secrets:
      - application_credentials
      - frost_credentials # from auth.yml
    build:
      context: ../packages/rime-ingest
      dockerfile: Dockerfile
    depends_on:
      - web
      - database
      - mosquitto
    env_file:
      - path: .env
        required: false
    environment:
      - FROST_ENDPOINT=http://web:8080/FROST-Server/v1.1
      - CONTAINER_ENVIRONMENT=true
    volumes:
      - python-app_tokens:/app/runtime/secrets/tokens
      - python-app_logs:/app/logs
      - ${SENSOR_CONFIG_PATH:-./sensor_configs}:/app/runtime/sensor_configs
      - ${APPLICATION_CONFIG_FILE:-./application-configs.yml}:/app/runtime/application-configs.yml
    restart: unless-stopped

volumes:
  python-app_tokens:
  python-app_logs:

secrets:
  application_credentials:
    file: ./secrets/credentials/application_credentials.json
