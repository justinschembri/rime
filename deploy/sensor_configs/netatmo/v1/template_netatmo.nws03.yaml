# SENSOR TYPE: Netatmo NWS03
# STA API version: 1.1
# INSTRUCTIONS
# 1 - Input the data near the *fill tag AND remove the tag
# 2 - ONE (1) Sensor per config file,
# 3 - Filename, sensor key / sensor name attribute should be device MAC address,
# 4 - iot_links shall use entity NAMES to refer to other entities,
Sensors:
  netatmo.nws03:
    name: <SENSOR_UUID>
    description: Netatmo NWS03 Sensor Array
    metadata: none
    encodingType: text
    properties:
      connectivity: Wi-Fi 802.11 b/g/n (2.4 GHz)
      recording_frequency: 5 minutes
      accuracy:
        temperature: ± 0.3°C
        humidity: 3%
        pressure: ± 1mbar
      measurement_range:
        temperature: 0°C to 50°C
        humidity: 0% to 100%
        pressure: 260mbar to 1160mbar
        CO2: 0ppm to 5000ppm
        noise: 35db to 120db
    iot_links:
      Datastreams: &datastreams
        - temperature_indoor
        - humidity
        - co2
        - gauge_pressure
        - noise
        - absolute_pressure

Things:
  Netatmo NWS03IN:
    name: Netatmo NWS03IN
    description: Netatmo Personal Weather Station
    properties:
      mac_address: <SENSOR_UUID>
    iot_links:
      Datastreams: *datastreams
      Locations:
        - <LOCATION_NAME>

Locations:
  <LOCATION_NAME>:
    name: <LOCATION_NAME>
    description: <THING_NAME> on the First Floor of the West Wing of the BK Building, Delft, The Netherlands.
    properties: null
    encodingType: application/geo+json
    location: # GeoJSON geometry field
      type: Point
      coordinates: [<LONGITUDE>, <LATITUDE>]
    iot_links:
      Things:
        - <THING_NAME>

Datastreams:
  temperature_indoor:
    name: temperature_indoor
    description: This datastream is measuring the internal room temperature.
    observationType: http://www.opengis.net/def/observationType/OGC-OM/2.0/OM_Measurement
    unitOfMeasurement: &temperature
      name: degree Celsius
      symbol: °C
      definition: https://unitsofmeasure.org/ucum#para-30
    observedArea: &observedArea # GeoJSON geometry field
      type: Polygon
      coordinates: null
    phenomenon_time: null
    result_time: null
    properties: null
    iot_links:
      ObservedProperties:
        - indoor_temperature
      Sensors:
        - <SENSOR_ID>
      Things:
        - <THING_NAME>

  humidity:
    name: humidity
    description:  Datastream for observations of humidity levels in <THING_NAME>.
    observationType: http://www.opengis.net/def/observationType/OGC-OM/2.0/OM_Measurement
    unitOfMeasurement:
      name: percent
      symbol: "%"
      definition: https://unitsofmeasure.org/ucum#para-29
    observedArea: *observedArea
    phenomenon_time: null
    result_time: null
    properties: null
    iot_links:
      ObservedProperties:
        - internal_humidity
      Sensors:
        - <SENSOR_ID>
      Things:
        - <THING_NAME>

  co2:
    name: co2
    description:  Datastream for observations of CO2 levels in <THING_NAME>.
    observationType: http://www.opengis.net/def/observationType/OGC-OM/2.0/OM_Measurement
    unitOfMeasurement:
      name: parts per million
      symbol: ppm
      definition: https://unitsofmeasure.org/ucum#para-29
    observedArea: *observedArea
    phenomenon_time: null
    result_time: null
    properties: null
    iot_links:
      ObservedProperties:
        - co2_levels
      Sensors:
        - <SENSOR_ID>
      Things:
        - <THING_NAME>

  gauge_pressure:
    name: gauge_pressure
    description:  Datastream for observations of pressure levels in <THING_NAME>.
    observationType: http://www.opengis.net/def/observationType/OGC-OM/2.0/OM_Measurement
    unitOfMeasurement: &millibar
      name: millibar
      symbol: mbar
      definition: https://unitsofmeasure.org/ucum#datyp2apdxatblxmp
    observedArea: *observedArea
    phenomenon_time: null
    result_time: null
    properties: null
    iot_links:
      ObservedProperties:
        - gauge_pressure
      Sensors:
        - <SENSOR_ID>
      Things:
        - <THING_NAME>

  absolute_pressure:
    name: absolute_pressure
    description: Datastream for observations of absolute pressure levels in <THING_NAME>.
    observationType: http://www.opengis.net/def/observationType/OGC-OM/2.0/OM_Measurement
    unitOfMeasurement: *millibar
    observedArea: *observedArea
    phenomenon_time: null
    result_time: null
    properties: null
    iot_links:
      ObservedProperties:
        - absolute_pressure
      Sensors:
        - <SENSOR_ID>
      Things:
        - <THING_NAME>

  noise:
    name: noise
    description:  Datastream for observations of noise levels in <THING_NAME>.
    observationType: http://www.opengis.net/def/observationType/OGC-OM/2.0/OM_Measurement
    unitOfMeasurement:
      name: decibel
      symbol: db
      definition: https://unitsofmeasure.org/ucum#para-46
    observedArea: *observedArea
    phenomenon_time: null
    result_time: null
    properties: null
    iot_links:
      ObservedProperties:
        - internal_noise_levels
      Sensors:
        - <SENSOR_ID>
      Things:
        - <THING_NAME>

ObservedProperties:
  indoor_temperature:
    name: indoor_temperature
    definition: https://qudt.org/vocab/quantitykind/Temperature
    description: The temperature where the indoor module is placed.
    properties: null

  absolute_pressure:
    name: absolute_pressure
    definition: https://qudt.org/vocab/quantitykind/Pressure
    description: The absolute pressure where the indoor module is placed.
    properties: null

  gauge_pressure:
    name: gauge_pressure
    definition: https://qudt.org/vocab/quantitykind/GaugePressure
    description: The gauge pressure where the indoor module is placed.
    properties: null

  internal_noise_levels:
    name: internal_noise_levels
    definition: https://qudt.org/vocab/quantitykind/SoundPressureLevel
    description: The internal ambient noise level where the sensor is placed.
    properties: null

  co2_levels:
    name: co2_levels
    definition: http://codes.wmo.int/wmdr/ObservedVariableAtmosphere/194
    description: The CO2 levels wherever the indoor module is placed.
    properties: null

  internal_humidity:
    name: internal_humidity
    definition: https://qudt.org/vocab/quantitykind/RelativeHumidity
    description: The internal humidity levels wherever the indoor sensor is placed.
    properties: null
