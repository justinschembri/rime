# TEMPLATE: Eltek datalogger CSV export
# Generate config using: rime generate-config eltek.datalogger

Sensors:
  eltek.datalogger:
    name: <SENSOR_ID>  # e.g. K02212-12943 — must match X-Rime-Message-Id on edge
    description: Eltek datalogger
    encodingType: text/csv
    properties: null
    iot_links:
      Datastreams: &datastreams
        - eltek_chan_1_temperature
        - eltek_chan_2_temperature
        - eltek_chan_3_temperature
        - eltek_chan_4_temperature
        - eltek_chan_5_voltage
        - eltek_chan_6_voltage
        - eltek_chan_7_voltage
        - eltek_chan_8_voltage

Things:
  <THING_NAME>:
    name: <THING_NAME>
    description: <THING_DESCRIPTION>
    properties: null
    iot_links:
      Datastreams: *datastreams
      Locations:
        - <LOCATION_NAME>

Locations:
  <LOCATION_NAME>:
    name: <LOCATION_NAME>
    description: <LOCATION_DESCRIPTION>
    properties: null
    encodingType: application/geo+json
    location:
      type: Point
      coordinates: [<LONGITUDE>, <LATITUDE>]
    iot_links:
      Things:
        - <THING_NAME>

Datastreams:
  eltek_chan_1_temperature: &temp_ds
    name: eltek_chan_1_temperature
    description: Eltek channel 1 temperature
    observationType: instant
    unitOfMeasurement: &temperature
      name: degree Celsius
      symbol: °C
      definition: https://unitsofmeasure.org/ucum#para-30
    observedArea: &observedArea
      type: Polygon
      coordinates: null
    phenomenon_time: null
    result_time: null
    properties: null
    iot_links:
      ObservedProperties: [eltek_chan_1_temperature]
      Sensors: [<SENSOR_ID>]
      Things: [<THING_NAME>]

  eltek_chan_2_temperature:
    <<: *temp_ds
    name: eltek_chan_2_temperature
    description: Eltek channel 2 temperature
    iot_links:
      ObservedProperties: [eltek_chan_2_temperature]
      Sensors: [<SENSOR_ID>]
      Things: [<THING_NAME>]

  eltek_chan_3_temperature:
    <<: *temp_ds
    name: eltek_chan_3_temperature
    description: Eltek channel 3 temperature
    iot_links:
      ObservedProperties: [eltek_chan_3_temperature]
      Sensors: [<SENSOR_ID>]
      Things: [<THING_NAME>]

  eltek_chan_4_temperature:
    <<: *temp_ds
    name: eltek_chan_4_temperature
    description: Eltek channel 4 temperature
    iot_links:
      ObservedProperties: [eltek_chan_4_temperature]
      Sensors: [<SENSOR_ID>]
      Things: [<THING_NAME>]

  eltek_chan_5_voltage: &voltage_ds
    name: eltek_chan_5_voltage
    description: Eltek channel 5 voltage
    observationType: instant
    unitOfMeasurement: &millivolt
      name: millivolt
      symbol: mV
      definition: https://unitsofmeasure.org/ucum#para-30
    observedArea: *observedArea
    phenomenon_time: null
    result_time: null
    properties: null
    iot_links:
      ObservedProperties: [eltek_chan_5_voltage]
      Sensors: [<SENSOR_ID>]
      Things: [<THING_NAME>]

  eltek_chan_6_voltage:
    <<: *voltage_ds
    name: eltek_chan_6_voltage
    description: Eltek channel 6 voltage
    iot_links:
      ObservedProperties: [eltek_chan_6_voltage]
      Sensors: [<SENSOR_ID>]
      Things: [<THING_NAME>]

  eltek_chan_7_voltage:
    <<: *voltage_ds
    name: eltek_chan_7_voltage
    description: Eltek channel 7 voltage
    iot_links:
      ObservedProperties: [eltek_chan_7_voltage]
      Sensors: [<SENSOR_ID>]
      Things: [<THING_NAME>]

  eltek_chan_8_voltage:
    <<: *voltage_ds
    name: eltek_chan_8_voltage
    description: Eltek channel 8 voltage
    iot_links:
      ObservedProperties: [eltek_chan_8_voltage]
      Sensors: [<SENSOR_ID>]
      Things: [<THING_NAME>]

ObservedProperties:
  eltek_chan_1_temperature:
    name: eltek_chan_1_temperature
    definition: https://dbpedia.org/page/Temperature
    description: Eltek channel 1 temperature
    properties: null
  eltek_chan_2_temperature:
    name: eltek_chan_2_temperature
    definition: https://dbpedia.org/page/Temperature
    description: Eltek channel 2 temperature
    properties: null
  eltek_chan_3_temperature:
    name: eltek_chan_3_temperature
    definition: https://dbpedia.org/page/Temperature
    description: Eltek channel 3 temperature
    properties: null
  eltek_chan_4_temperature:
    name: eltek_chan_4_temperature
    definition: https://dbpedia.org/page/Temperature
    description: Eltek channel 4 temperature
    properties: null
  eltek_chan_5_voltage:
    name: eltek_chan_5_voltage
    definition: https://dbpedia.org/page/Voltage
    description: Eltek channel 5 voltage
    properties: null
  eltek_chan_6_voltage:
    name: eltek_chan_6_voltage
    definition: https://dbpedia.org/page/Voltage
    description: Eltek channel 6 voltage
    properties: null
  eltek_chan_7_voltage:
    name: eltek_chan_7_voltage
    definition: https://dbpedia.org/page/Voltage
    description: Eltek channel 7 voltage
    properties: null
  eltek_chan_8_voltage:
    name: eltek_chan_8_voltage
    definition: https://dbpedia.org/page/Voltage
    description: Eltek channel 8 voltage
    properties: null
