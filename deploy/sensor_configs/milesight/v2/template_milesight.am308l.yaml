    observedArea: *id002
    phenomenon_time: null
    properties: null
    result_time: null
    iot_links:
      ObservedProperties:
      - gauge_pressure
      Sensors:
      - <SENSOR_UUID>
      Things:
      - Milesight AM308L
  battery_level:
    name: battery_level
    description: Battery level of the sensor.
    resultType:
