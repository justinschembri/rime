    properties: null
    result_time: null
    iot_links:
      ObservedProperties:
      - battery_level
      Sensors:
      - <SENSOR_UUID>
      Things:
      - Milesight AM308L
  passive_infrared:
    name: passive_infrared
    description: PIR.
    resultType:
      type: Boolean
    observedArea: *id002
    phenomenon_time: null
    properties: null
    result_time: null
    iot_links:
      ObservedProperties:
      - motion
      Sensors:
      - <SENSOR_UUID>
      Things:
      - Milesight AM308L
  particulate_matter_10:
    name: particulate_matter_10
    description: '...'
    resultType:
      type: Quantity
      uom:
        symbol: μg/m3
        code: μg/m3
        label: '...'
        definition: '...'
    observedArea: *id002
    phenomenon_time: null
    properties: null
    result_time: null
    iot_links:
      ObservedProperties:
      - coarse_airborne_particles
      Sensors:
      - <SENSOR_UUID>
      Things:
      - Milesight AM308L
  particulate_matter_2_5:
    name: particulate_matter_2_5
    description: '...'
    resultType:
      type: Quantity
      uom:
        symbol: μg/m3
        code: μg/m3
        label: '...'
        definition: '...'
    observedArea: *id002
    phenomenon_time: null
    properties: null
    result_time: null
    iot_links:
      ObservedProperties:
      - fine_airborne_particles
      Sensors:
      - <SENSOR_UUID>
