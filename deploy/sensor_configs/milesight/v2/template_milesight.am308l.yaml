# SENSOR TYPE: Milesight AM308L
# STA API version: 2.0
# INSTRUCTIONS
# 1 - Input the data near the *fill tag AND remove the tag
# 2 - ONE (1) Sensor per config file,
# 3 - Filename, sensor key / sensor name attribute should be device MAC address,
# 4 - iot_links shall use entity NAMES to refer to other entities,

Sensors:
  milesight.am308l:
    name: <SENSOR_UUID>
    description: Milesight AM308L-LoRaWAN Indoor Air Quality Sensor (7 in 1)
    metadata: https://resource.milesight.com/milesight/iot/document/am30x-datasheet-en.pdf
    encodingType: application/pdf
    properties:
      wireless_transmission:
        technology: LoRaWAN
        frequency: CN470/RU864/IN865/EU868/US915/AU915/KR920/AS923-1&2&3&4
        tx_power: 16dBm(868MHz)/22dBm(915MHz)/19dBm(470MHz)
        sensitivity: 137dBm @300bps
        work_mode: OTAA/ABP Class A
      sensors:
        temperature:
          operating_principle: Digital CMOSens technology (MEMS)
          range: -20°C~60°C
          accuracy: ± 0.2°C
          resolution: 0.1°C
        humidity:
          operating_principle: Digital CMOSens technology (MEMS)
          range: 0% ~ 100% RH
          accuracy: ± 2% RH
          resolution: 0.5% RH
        motion:
          operating_principle: Passive infrared (PIR)
          detection_range: 80 ° Horizontal, 55 ° Vertical, 5m
          status: vacant / occupied
        light:
          operating_principle: Photodiode
          range: 0-60000 Lux (Determine as 6 levels, 0-5)
        tvoc:
          operating_principle: MOX (MEMS)
          range: 1.00~5.00 (IAQ Rating)
          accuracy: ±1
          resolution: 0.01
        barometric_pressure:
          operating_principle: Piezoresistive absolute pressure sensor (MEMS)
          range: 260 - 1260 hPa
          accuracy: ±0.5hPa
          resolution: 0.1 hPa
        carbon_dioxide:
          operating_princple: Nondispersive Infrared (NDIR)
          range: 400 ~ 500 ppm
          accuracy: ± (30 ppm + 3% of reading) at (0°C~ 50°C, 0% to 85%RH)
          resolution: 1 ppm
        pm_2.5_and_pm_10:
          operating principle: Laser Scattering
          range: 0 ~ 1000 μg/m3
          accuracy: 0~100(±10μg/m3) at 100~1000(±10 %) and (-10°C~ 60°C)
          resolution: 1 μg/m3
    iot_links:
      Datastreams: &id001
      - battery_level
      - co2
      - humidity
      - light_level
      - passive_infrared
      - particulate_matter_10
      - particulate_matter_2_5
      - gauge_pressure
      - temperature_indoor
      - total_volatile_organic_compounds
Things:
  Milesight AM308L:
    name: Milesight AM308L
    description: Milesight AM308L-LoRaWAN Indoor Air Quality Sensor (7 in 1)
    properties:
      dev_eui: <SENSOR_UUID>
    iot_links:
      Datastreams: *id001
      Locations:
      - <LOCATION_NAME>
Locations:
  <LOCATION_NAME>:
    name: <LOCATION_NAME>
    description: <LOCATION_DESCRIPTION>
    properties:
      climate_zone: Warm Mediterranean climate
    encodingType: application/geo+json
    location:
      type: Point
      coordinates:
      - <LONGITUDE>
      - <LATITUDE>
    iot_links:
      Things:
      - Milesight AM308L
Datastreams:
  temperature_indoor:
    name: temperature_indoor
    description: This datastream is measuring the internal room temperature.
    resultType:
      type: Quantity
      uom:
        symbol: °C
        code: °C
        label: degree Celsius
        definition: https://unitsofmeasure.org/ucum#para-30
    observedArea: &id002
      type: Polygon
      coordinates: null
    phenomenon_time: null
    result_time: null
    properties: null
    iot_links:
      ObservedProperties:
      - temperature_indoor
      Sensors:
      - <SENSOR_UUID>
      Things:
      - Milesight AM308L
  humidity:
    name: humidity
    description: Datastream for observations of humidity levels in Milesight AM308L.
    resultType:
      type: Quantity
      uom:
        symbol: '%'
        code: '%'
        label: percent
        definition: https://unitsofmeasure.org/ucum#para-29
    observedArea: *id002
    phenomenon_time: null
    properties: null
    result_time: null
    iot_links:
      ObservedProperties:
      - internal_humidity
      Sensors:
      - <SENSOR_UUID>
      Things:
      - Milesight AM308L
  co2:
    name: co2
    description: Datastream for observations of CO2 levels in Milesight AM308L.
    resultType:
      type: Quantity
      uom:
        symbol: ppm
        code: ppm
        label: parts per million
        definition: https://unitsofmeasure.org/ucum#para-29
    observedArea: *id002
    phenomenon_time: null
    properties: null
    result_time: null
    iot_links:
      ObservedProperties:
      - co2_levels
      Sensors:
      - <SENSOR_UUID>
      Things:
      - Milesight AM308L
  gauge_pressure:
    name: gauge_pressure
    description: Datastream for observations of pressure levels in Milesight AM308L.
    resultType:
      type: Quantity
      uom:
        symbol: mbar
        code: mbar
        label: millibar
