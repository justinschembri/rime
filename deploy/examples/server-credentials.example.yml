# Example server credentials for rime-server-http.
# Copy to deploy/secrets/credentials/server-credentials.yml and replace tokens.

limits:
  max_body_bytes: 1048576
  max_queue_depth_per_app: 1000

apps:
  eltek-field-01:
    ingress_token: "replace-with-edge-secret"
    egress_token: "replace-with-ingest-secret"
