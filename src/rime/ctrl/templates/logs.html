{% extends "base.html" %}
{% block title %}Logs — rime-ctrl{% endblock %}
{% block content %}

<div class="page-header">
  <h1>Logs</h1>
  <small>Last 100 lines of general.log — auto-refreshes every 10 s</small>
</div>

<div
  id="log-container"
  hx-get="/ui/logs/tail"
  hx-trigger="load, every 10s"
  hx-swap="innerHTML"
  style="font-family: monospace; font-size: 0.8em; overflow-x: auto; background: var(--pico-code-background-color, #f8f8f8); border-radius: 6px; padding: 1rem;">
  <p aria-busy="true">Loading…</p>
</div>

{% endblock %}
