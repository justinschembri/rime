# Build and push rime-ingest to GHCR when a version tag is pushed.
# Publish only runs after tests pass on the tagged commit.
name: Release rime-ingest

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run non-auth tests
        run: uv run pytest -m "not real and not online and not docker"

  release:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image name
        id: image
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/rime-ingest" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: packages/rime-ingest
          file: packages/rime-ingest/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ github.ref_name }}
