# Ephemeral FROST stack for tests. No secrets, no persistence, no auth.
# Used by tests/sensorthings_utils/frosty/conftest.py::docker_frost.
services:
  db:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: sensorthings
      POSTGRES_USER: sensorthings
      POSTGRES_PASSWORD: sensorthings
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sensorthings -d sensorthings"]
      interval: 2s
      timeout: 2s
      retries: 30

  frost:
    image: fraunhoferiosb/frost-server:2.6
    depends_on:
      db:
        condition: service_healthy
    environment:
      serviceRootUrl: "http://localhost:${FROST_TEST_PORT:-18080}/FROST-Server"
      plugins_multiDatastream.enable: "false"
      http_cors_enable: "true"
      http_cors_allowed_origins: "*"
      persistence_db_driver: org.postgresql.Driver
      persistence_db_url: jdbc:postgresql://db:5432/sensorthings
      persistence_db_username: sensorthings
      persistence_db_password: sensorthings
      persistence_autoUpdateDatabase: "true"
    ports:
      - "${FROST_TEST_PORT:-18080}:8080"
