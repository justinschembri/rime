Sensors:
  netatmo.nws03:
    name: sensor-001
    description: Netatmo NWS03
    metadata: none
    encodingType: text
    properties:
      connectivity: wifi
    iot_links:
      Datastreams:
        - temperature_indoor

Things:
  room-120:
    name: room-120
    description: Test room
    properties: null
    iot_links:
      Datastreams:
        - temperature_indoor
      Locations:
        - loc-120

Locations:
  loc-120:
    name: loc-120
    description: Test location
    properties: null
    encodingType: application/geo+json
    location:
      type: Point
      coordinates: [52.0, 4.3]
    iot_links:
      Things:
        - room-120

Datastreams:
  temperature_indoor:
    name: temperature_indoor
    description: Indoor temperature datastream
    observationType: instant
    unitOfMeasurement:
      name: degree Celsius
      symbol: C
      definition: https://unitsofmeasure.org/ucum#para-30
    observedArea:
      type: Polygon
      coordinates: null
    phenomenon_time: null
    result_time: null
    properties: null
    iot_links:
      ObservedProperties:
        - indoor_temperature
      Sensors:
        - sensor-001
      Things:
        - room-120

ObservedProperties:
  indoor_temperature:
    name: indoor_temperature
    definition: https://dbpedia.org/page/Temperature
    description: Temperature at sensor location
    properties: null
